<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">DonutMap hex logo</title>
  <desc id="desc">A hexagonal logo showing donut charts connected by map flow lines.</desc>
  <defs>
    <linearGradient id="hex-fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#17324d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <polygon points="110,6 204,60 204,160 110,214 16,160 16,60"
           fill="url(#hex-fill)" stroke="#17324d" stroke-width="7" filter="url(#shadow)"/>

  <path d="M42 173 C72 133 98 137 118 102 S159 61 184 82"
        fill="none" stroke="#5c6f82" stroke-width="8" stroke-linecap="round" opacity="0.36"/>
  <path d="M53 70 C81 90 93 123 118 139 S159 158 178 136"
        fill="none" stroke="#5c6f82" stroke-width="6" stroke-linecap="round" opacity="0.28"/>
  <path d="M64 180 C94 162 125 167 153 144"
        fill="none" stroke="#5c6f82" stroke-width="5" stroke-linecap="round" opacity="0.24"/>

  <circle cx="69" cy="84" r="7" fill="#17324d" opacity="0.2"/>
  <circle cx="158" cy="86" r="7" fill="#17324d" opacity="0.2"/>
  <circle cx="92" cy="166" r="7" fill="#17324d" opacity="0.2"/>
  <circle cx="158" cy="156" r="7" fill="#17324d" opacity="0.2"/>

  <g transform="translate(69 84)">
    <circle r="30" fill="#ffffff" stroke="#17324d" stroke-width="4"/>
    <path d="M0,-30 A30,30 0 0,1 28.19,10.26 L13.16,4.79 A14,14 0 0,0 0,-14 Z"
          fill="#1b9e77"/>
    <path d="M28.19,10.26 A30,30 0 0,1 -25.98,15 L-12.12,7 A14,14 0 0,0 13.16,4.79 Z"
          fill="#7570b3"/>
    <path d="M-25.98,15 A30,30 0 0,1 0,-30 L0,-14 A14,14 0 0,0 -12.12,7 Z"
          fill="#d95f02"/>
    <circle r="13.5" fill="#f8fbff" stroke="#ffffff" stroke-width="2"/>
  </g>

  <g transform="translate(158 86)">
    <circle r="24" fill="#ffffff" stroke="#17324d" stroke-width="4"/>
    <path d="M0,-24 A24,24 0 0,1 20.78,12 L9.53,5.5 A11,11 0 0,0 0,-11 Z"
          fill="#1b9e77"/>
    <path d="M20.78,12 A24,24 0 0,1 -20.78,12 L-9.53,5.5 A11,11 0 0,0 9.53,5.5 Z"
          fill="#7570b3"/>
    <path d="M-20.78,12 A24,24 0 0,1 0,-24 L0,-11 A11,11 0 0,0 -9.53,5.5 Z"
          fill="#d95f02"/>
    <circle r="10.5" fill="#f8fbff" stroke="#ffffff" stroke-width="2"/>
  </g>

  <g transform="translate(101 160)">
    <circle r="34" fill="#ffffff" stroke="#17324d" stroke-width="4"/>
    <path d="M0,-34 A34,34 0 0,1 32.34,10.51 L15.22,4.94 A16,16 0 0,0 0,-16 Z"
          fill="#1b9e77"/>
    <path d="M32.34,10.51 A34,34 0 0,1 -19.98,27.51 L-9.4,12.95 A16,16 0 0,0 15.22,4.94 Z"
          fill="#7570b3"/>
    <path d="M-19.98,27.51 A34,34 0 0,1 0,-34 L0,-16 A16,16 0 0,0 -9.4,12.95 Z"
          fill="#d95f02"/>
    <circle r="15.5" fill="#f8fbff" stroke="#ffffff" stroke-width="2"/>
  </g>

</svg>
